<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .game-container {
            text-align: center;
        }

        h1 {
            color: #4ecca3;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(78, 204, 163, 0.5);
        }

        .score-container {
            color: #fff;
            font-size: 1.5rem;
            margin-bottom: 20px;
        }

        .score {
            color: #4ecca3;
            font-weight: bold;
        }

        #gameCanvas {
            border: 3px solid #4ecca3;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(78, 204, 163, 0.3);
            background: #0a0a0a;
        }

        .controls {
            margin-top: 20px;
            color: #888;
        }

        .controls p {
            margin: 5px 0;
        }

        .btn {
            background: #4ecca3;
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.2rem;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #3db892;
            transform: scale(1.05);
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            border: 2px solid #e74c3c;
            display: none;
        }

        .game-over h2 {
            color: #e74c3c;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .game-over p {
            color: #fff;
            font-size: 1.3rem;
            margin-bottom: 20px;
        }

        .canvas-wrapper {
            position: relative;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>Snake Game</h1>
        <div class="score-container">
            Score: <span class="score" id="score">0</span>
        </div>
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div class="game-over" id="gameOver">
                <h2>Game Over!</h2>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button class="btn" onclick="resetGame()">Play Again</button>
            </div>
        </div>
        <div class="controls">
            <p>Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to control the snake</p>
            <p>Press <strong>SPACE</strong> to pause</p>
        </div>
        <button class="btn" onclick="resetGame()">New Game</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOver');

        // Game settings
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Game state
        let snake = [{ x: 10, y: 10 }];
        let food = { x: 15, y: 15 };
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameOver = false;

        // Colors
        const snakeHeadColor = '#4ecca3';
        const snakeBodyColor = '#3db892';
        const foodColor = '#e74c3c';
        const gridColor = '#1a1a2e';

        // Input handling
        document.addEventListener('keydown', handleKeyPress);

        function handleKeyPress(e) {
            // Prevent default scrolling for arrow keys
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
                e.preventDefault();
            }

            if (e.key === ' ') {
                togglePause();
                return;
            }

            if (isGameOver) return;

            switch(e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };

            // Make sure food doesn't spawn on snake
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        function update() {
            if (isPaused || isGameOver) return;

            // Don't move if no direction set
            if (dx === 0 && dy === 0) return;

            // Calculate new head position
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Check wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            // Check self collision
            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            // Add new head
            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                generateFood();
                // Speed up slightly as score increases
                if (score % 50 === 0 && gameLoop) {
                    clearInterval(gameLoop);
                    gameLoop = setInterval(gameStep, Math.max(50, 100 - score / 5));
                }
            } else {
                // Remove tail if not eating
                snake.pop();
            }
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid (subtle)
            ctx.strokeStyle = gridColor;
            ctx.lineWidth = 0.5;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // Draw food with glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = foodColor;
            ctx.fillStyle = foodColor;
            ctx.fillRect(food.x * gridSize + 2, food.y * gridSize + 2, gridSize - 4, gridSize - 4);
            ctx.shadowBlur = 0;

            // Draw snake
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = snakeHeadColor;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = snakeHeadColor;
                } else {
                    // Body
                    ctx.fillStyle = snakeBodyColor;
                    ctx.shadowBlur = 0;
                }

                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);

                // Draw eyes on head
                if (index === 0) {
                    ctx.fillStyle = '#0a0a0a';
                    const eyeSize = 3;
                    const eyeOffset = 4;

                    if (dx === 1) { // Moving right
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 13, eyeSize, eyeSize);
                    } else if (dx === -1) { // Moving left
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + eyeOffset, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 13, eyeSize, eyeSize);
                    } else if (dy === -1) { // Moving up
                        ctx.fillRect(segment.x * gridSize + eyeOffset, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 13, segment.y * gridSize + 5, eyeSize, eyeSize);
                    } else { // Moving down or stationary
                        ctx.fillRect(segment.x * gridSize + eyeOffset, segment.y * gridSize + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 13, segment.y * gridSize + 12, eyeSize, eyeSize);
                    }
                }
            });
            ctx.shadowBlur = 0;

            // Draw pause text
            if (isPaused) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4ecca3';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
            }
        }

        function gameStep() {
            update();
            draw();
        }

        function gameOver() {
            isGameOver = true;
            finalScoreElement.textContent = score;
            gameOverScreen.style.display = 'block';
        }

        function resetGame() {
            snake = [{ x: 10, y: 10 }];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            isPaused = false;
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            generateFood();

            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(gameStep, 100);
        }

        // Start the game
        resetGame();
    </script>
</body>
</html>
